<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wishlist — FAAF Collections & Souvenirs</title>
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<meta name="ga-measurement-id" content=""> <!-- paste your GA4 Measurement ID here, e.g. G-XXXXXXXXXX, to enable analytics -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="site-header" data-active=""></div>

<section class="page-header" style="padding:110px 0 50px;">
  <div class="eyebrow" style="justify-content:center;">Saved For Later</div>
  <h1>My Wishlist</h1>
  <div class="crumb">Home / Wishlist</div>
</section>

<section class="section" style="padding-top:50px;">
  <div class="container">
    <div class="product-grid reveal" id="wishlistGrid"></div>
    <div class="empty-wishlist" id="emptyWishlist" style="display:none;text-align:center;padding:60px 20px;">
      <div style="font-size:40px;margin-bottom:14px;">♡</div>
      <h3 style="margin-bottom:10px;">Your wishlist is empty</h3>
      <p style="color:var(--muted);margin-bottom:26px;">Tap the heart icon on any product to save it here.</p>
      <a href="shop.html" class="btn btn-gold">Start Shopping</a>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="assets/js/partials.js"></script>
<script src="assets/js/demo-data.js?v=static-demo-4"></script>
<script src="assets/js/main.js?v=static-demo-4"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/wishlist.js"></script>
<script>
function renderWishlistPage() {
  const list = getWishlist();
  const grid = document.querySelector('#wishlistGrid');
  const empty = document.querySelector('#emptyWishlist');

  if (!list.length) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.style.display = '';
  empty.style.display = 'none';

  grid.innerHTML = list.map(p => `
    <div class="product-card">
      <a href="product.html?slug=${p.slug}" class="frame">
        <img class="main" src="${escapeHtml(p.image || 'https://placehold.co/600x740/c9a227/15130f?text=FAAF')}" alt="${escapeHtml(p.name)}">
        <div class="product-quick">
          <button class="qa-btn" onclick="event.preventDefault();moveToCart(${p.product_id})">Add to Bag</button>
        </div>
      </a>
      <button class="wishlist-heart active" onclick="event.preventDefault();removeAndRerender(${p.product_id})" aria-label="Remove from wishlist">
        <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>
      </button>
      <div class="product-info">
        <a href="product.html?slug=${p.slug}"><h3>${escapeHtml(p.name)}</h3></a>
        <div class="price"><span class="now">${formatCurrency(p.price)}</span></div>
      </div>
    </div>
  `).join('');
}

function moveToCart(productId) {
  const item = getWishlist().find(w => w.product_id === productId);
  if (!item) return;
  addToCart({ product_id: item.product_id, name: item.name, price: item.price, image: item.image, quantity: 1 });
}

function removeAndRerender(productId) {
  removeFromWishlist(productId);
  renderWishlistPage();
}

document.addEventListener('partialsReady', renderWishlistPage);
</script>
</body>
</html>
